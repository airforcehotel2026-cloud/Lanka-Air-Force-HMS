name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4  # v3 වෙනුවට v4 පාවිච්චි කරන්න
        with:
          version: 10              # 9 වෙනුවට 10 දාන්න (අර engine error එක නිසා)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22          # Node 20 වෙනුවට 22 (LTS) පාවිච්චි කිරීම හොඳයි
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: npx quasar build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/spa
